name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push a Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://maggy10:$HF_TOKEN@huggingface.co/spaces/maggy10/Balance main
